version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: shopsphere-postgres

    restart: always

    environment:
      POSTGRES_DB: shopsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - shopsphere-network

  backend:

    image: 051495878977.dkr.ecr.ap-south-1.amazonaws.com/shopsphere:backend-v1

    container_name: shopsphere-backend

    restart: always

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shopsphere
      DB_USER: postgres
      DB_PASSWORD: postgres

    networks:
      - shopsphere-network

  frontend:

    image: 051495878977.dkr.ecr.ap-south-1.amazonaws.com/shopsphere:frontend-v1

    container_name: shopsphere-frontend

    restart: always

    depends_on:
      - backend

    networks:
      - shopsphere-network

  nginx:

    image: nginx:latest

    container_name: shopsphere-nginx

    restart: always

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - shopsphere-network

volumes:

  postgres-data:

networks:

  shopsphere-network: